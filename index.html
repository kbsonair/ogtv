<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오징어티비</title>
<link rel="icon" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050506;
    --surface: #0e0e11;
    --surface2: #18181c;
    --surface3: #1f1f24;
    --border: #26262c;
    --accent: #c9006b;
    --accent2: #8f0050;
    --accent-glow: rgba(201, 0, 107, 0.35);
    --text: #f2f2f5;
    --text2: #8a8a95;
    --text3: #45454f;
    --live: #ff2f86;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
  }

  body { min-height: 100vh; }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER (로고만, 중앙 정렬) ── */
  header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 18px 0;
    background: #e6345c;
    border-bottom: 1px solid #b81f45;
  }
  .logo-img {
    height: 46px;
    width: auto;
    object-fit: contain;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── PLAYER SECTION ── */
  .player-section {
    background: #000;
    padding: 22px 20px 0;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .player-container {
    width: 100%;
    max-width: 1120px;
    padding-bottom: 22px;
  }
  .video-wrap {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 10px 40px -10px var(--accent-glow);
  }
  .video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  .video-wrap:fullscreen,
  .video-wrap:-webkit-full-screen {
    width: 100vw; height: 100vh;
    max-height: none; aspect-ratio: unset;
    background: #000;
    border-radius: 0;
  }
  .video-wrap:fullscreen video,
  .video-wrap:-webkit-full-screen video { object-fit: contain; }

  /* ── CUSTOM CONTROLS (상단, 심플 스타일) ── */
  .player-controls {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 14px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.35) 60%, transparent 100%);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .video-wrap:hover .player-controls,
  .video-wrap.show-controls .player-controls { opacity: 1; pointer-events: all; }
  .pc-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .pc-title {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .pc-live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: blink 1.5s infinite;
    flex-shrink: 0;
  }
  .pc-name {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }
  .pc-tag {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .pc-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
  }
  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.85);
    cursor: pointer; padding: 3px;
    display: flex; align-items: center;
    transition: color 0.15s, transform 0.12s;
    user-select: none;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
  }
  .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.92); }
  .pc-menu {
    position: absolute;
    top: 26px; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    min-width: 110px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    z-index: 10;
  }
  .pc-menu.open { display: flex; }
  .pc-menu button {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    text-align: left;
    padding: 7px 9px;
    border-radius: 5px;
    cursor: pointer;
  }
  .pc-menu button:hover { background: var(--surface2); color: var(--accent); }
  .pc-err {
    position: absolute;
    top: 12px; left: 14px;
    display: none;
    align-items: center; gap: 5px;
    color: #ff8a8a; font-size: 10.5px;
    padding: 2px 8px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,107,107,0.35);
    border-radius: 4px;
  }
  .pc-err.show { display: flex; }

  /* ── OVERLAY ── */
  .video-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    flex-direction: column; gap: 10px;
    transition: opacity 0.3s;
  }
  .video-overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .overlay-text { color: var(--text2); font-size: 13px; }
  .loading-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── CHANNELS SECTION ── */
  .channels-section {
    flex: 1;
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 22px 20px 40px;
  }

  .channels-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .channel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .toolbar-sep { flex: 1; min-width: 8px; }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    padding: 7px 14px 7px 32px;
    width: 180px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }
  #search:focus { border-color: var(--accent); width: 220px; }
  #search::placeholder { color: var(--text3); }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .view-btn {
    background: var(--surface2);
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 7px 11px;
    display: flex; align-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--border); }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--accent); color: #fff; }

  .categories {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── BOX (GRID) VIEW ── */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .channel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, transform 0.12s, background 0.15s;
    position: relative;
  }
  .channel-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .channel-card.active {
    border-color: var(--accent);
    background: var(--surface3);
    box-shadow: 0 0 0 1px var(--accent), 0 6px 18px -6px var(--accent-glow);
  }
  .card-avatar {
    width: 42px; height: 42px;
    border-radius: 9px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: -0.5px;
  }
  .channel-card.active .card-avatar { border-color: var(--accent); color: var(--accent); }
  .card-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tag { font-size: 9.5px; color: var(--text3); }
  .card-live {
    position: absolute;
    top: 8px; right: 8px;
    display: flex; align-items: center; gap: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px; font-weight: 600;
    color: var(--live); letter-spacing: 1px;
  }
  .card-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--live); animation: blink 1.5s infinite; }

  /* ── TABLE VIEW ── */
  .channel-table-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table.channel-table { width: 100%; border-collapse: collapse; }
  .channel-table thead th {
    text-align: left;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--surface2);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .channel-table tbody tr {
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }
  .channel-table tbody tr:last-child { border-bottom: none; }
  .channel-table tbody tr:hover { background: var(--surface2); }
  .channel-table tbody tr.active { background: var(--surface3); }
  .channel-table tbody tr.active td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
  .channel-table td { padding: 9px 14px; font-size: 12.5px; color: var(--text); background: var(--surface); }
  .channel-table tbody tr:hover td,
  .channel-table tbody tr.active td { background: transparent; }
  .td-idx { color: var(--text3); font-family: 'IBM Plex Mono', monospace; font-size: 11px; width: 44px; }
  .td-tag { color: var(--text2); font-size: 11px; }
  .td-live { width: 70px; }
  .table-live {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px; font-weight: 600;
    color: var(--live); letter-spacing: 1px;
  }
  .table-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--live); animation: blink 1.5s infinite; }

  .empty-state {
    padding: 40px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12.5px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

</style>
</head>
<body>
<div class="app">

  <!-- HEADER: 로고만 중앙 정렬 -->
  <header>
    <img class="logo-img" src="logo.png" alt="오징어티비">
  </header>

  <div class="main">

    <!-- PLAYER -->
    <div class="player-section">
      <div class="player-container">
        <div class="video-wrap" id="video-wrap">
          <video id="video" autoplay playsinline></video>
          <div class="player-controls" id="player-controls">
            <div class="pc-left">
              <button class="ctrl-btn" id="btn-play" title="재생/정지 (Space)">
                <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                  <polygon points="5 3 19 12 5 21"/>
                </svg>
                <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
                  <rect x="6" y="4" width="4" height="16" rx="1"/>
                  <rect x="14" y="4" width="4" height="16" rx="1"/>
                </svg>
              </button>
              <div class="pc-title">
                <span class="pc-live-dot" id="live-badge" style="display:none"></span>
                <span class="pc-name" id="vi-name">채널을 선택해주세요</span>
                <span class="pc-tag" id="vi-tag"></span>
              </div>
            </div>
            <div class="pc-right">
              <button class="ctrl-btn" id="btn-mute" title="음소거">
                <svg id="icon-vol-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
                <svg id="icon-vol-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                  <line x1="16" y1="9" x2="22" y2="15"/>
                  <line x1="22" y1="9" x2="16" y2="15"/>
                </svg>
              </button>
              <button class="ctrl-btn" id="btn-fs" title="전체화면 (F)">
                <svg id="icon-fs" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                  <polyline points="15 3 21 3 21 9"/>
                  <polyline points="9 21 3 21 3 15"/>
                  <line x1="21" y1="3" x2="14" y2="10"/>
                  <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
              </button>
              <button class="ctrl-btn" id="btn-more" title="더보기">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                  <circle cx="12" cy="5" r="2"/>
                  <circle cx="12" cy="12" r="2"/>
                  <circle cx="12" cy="19" r="2"/>
                </svg>
              </button>
              <div class="pc-menu" id="pc-menu">
                <button id="menu-pip">PIP 모드</button>
              </div>
            </div>
            <div class="pc-err" id="err-msg">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              스트림 연결 오류
            </div>
          </div>
          <div class="video-overlay" id="overlay">
            <div class="overlay-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#44445a" stroke-width="1.5">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </div>
            <span class="overlay-text">채널을 선택하세요</span>
          </div>
        </div>
      </div>
    </div>

    <!-- CHANNELS -->
    <div class="channels-section">
      <div class="channels-toolbar">
        <span class="channel-count" id="ch-count">로딩중…</span>
        <div class="toolbar-sep"></div>
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" type="text" placeholder="채널 검색…" autocomplete="off">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-view-box" title="박스형">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="8" height="8" rx="1.5"/>
              <rect x="13" y="3" width="8" height="8" rx="1.5"/>
              <rect x="3" y="13" width="8" height="8" rx="1.5"/>
              <rect x="13" y="13" width="8" height="8" rx="1.5"/>
            </svg>
          </button>
          <button class="view-btn" id="btn-view-table" title="표형">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="categories" id="categories"></div>

      <div id="channel-grid" class="channel-grid"></div>

      <div id="channel-table-wrap" class="channel-table-wrap" style="display:none">
        <table class="channel-table">
          <thead>
            <tr>
              <th class="td-idx">#</th>
              <th>채널명</th>
              <th class="td-tag">카테고리</th>
              <th class="td-live">상태</th>
            </tr>
          </thead>
          <tbody id="channel-table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ── CATEGORY CONFIG ──
const CATS = [
  { label: '전체', fn: () => true },
  { label: '지상파', fn: n => /^(KBS1|KBS2|MBC|SBS|EBS)$/.test(n.trim()) },
  { label: '종편/케이블', fn: n => ['JTBC','TV 조선','채널A','MBN','TVN','tvN Show','OCN','M-NET','iHQ','ENA','MBC ON'].includes(n.trim()) },
  { label: '뉴스', fn: n => /뉴스|YTN|경제|CBS|iNET/.test(n) },
  { label: '스포츠', fn: n => /스포츠|SPOTV|골프|빌리어즈|TVN Sports|Sky/.test(n) },
  { label: '키즈', fn: n => /육아|뽀요|어린이|에듀|투니|카툰|JEI/.test(n) },
  { label: '교양', fn: n => /디스커버리|Nat Geo|HISTORY|바둑|브레인|낚시|Discovery/.test(n) },
  { label: '종교', fn: n => /가톨릭|CTS|불교/.test(n) },
  { label: '해외', fn: n => /NHK|日テレ|フジ|朝日|WOWOW|CNN|BBC|中|중화/.test(n) },
  { label: 'HD', fn: n => / HD$/.test(n.trim()) },
];

// ── ABBREV ──
function abbrev(name) {
  name = name.replace(/ HD$/, '').trim();
  const words = name.split(/[\s\-_]+/);
  if (name.length <= 4) return name.toUpperCase();
  if (words.length >= 2) return words.slice(0, 2).map(w => w[0]).join('').toUpperCase();
  return name.slice(0, 3).toUpperCase();
}

// ── CATEGORY TAG ──
function getTag(name) {
  if (/^(KBS1|KBS2|MBC|SBS|EBS)$/.test(name.trim())) return '지상파';
  if (/스포츠|SPOTV|골프|빌리어즈|TVN Sports/.test(name)) return '스포츠';
  if (/뉴스|YTN|경제|CBS|iNET/.test(name)) return '뉴스';
  if (/육아|뽀요|어린이|에듀|투니|카툰|JEI/.test(name)) return '키즈';
  if (/NHK|日テレ|フジ|朝日|WOWOW|CNN|BBC/.test(name)) return '해외';
  if (/가톨릭|CTS|불교/.test(name)) return '종교';
  if (/디스커버리|Nat Geo|HISTORY|바둑|낚시/.test(name)) return '교양';
  return '케이블';
}

// ── STATE ──
let CHANNELS = [];
let activeCat = 0;
let activeIdx = null;
let currentHls = null;
let filtered = [];
let viewMode = 'box'; // 'box' | 'table'

// ── DOM ──
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const viName = document.getElementById('vi-name');
const viTag = document.getElementById('vi-tag');
const liveBadge = document.getElementById('live-badge');
const errMsg = document.getElementById('err-msg');
const channelGrid = document.getElementById('channel-grid');
const channelTableWrap = document.getElementById('channel-table-wrap');
const channelTableBody = document.getElementById('channel-table-body');
const searchEl = document.getElementById('search');
const chCount = document.getElementById('ch-count');
const btnViewBox = document.getElementById('btn-view-box');
const btnViewTable = document.getElementById('btn-view-table');

// ── VIEW TOGGLE ──
function setViewMode(mode) {
  viewMode = mode;
  btnViewBox.classList.toggle('active', mode === 'box');
  btnViewTable.classList.toggle('active', mode === 'table');
  channelGrid.style.display = mode === 'box' ? 'grid' : 'none';
  channelTableWrap.style.display = mode === 'table' ? 'block' : 'none';
}
btnViewBox.addEventListener('click', () => setViewMode('box'));
btnViewTable.addEventListener('click', () => setViewMode('table'));

// ── BUILD CATEGORIES ──
const catWrap = document.getElementById('categories');
CATS.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cat.label;
  btn.onclick = () => {
    activeCat = i;
    document.querySelectorAll('.cat-btn').forEach((b,j) => b.classList.toggle('active', j === i));
    applyFilters();
  };
  catWrap.appendChild(btn);
});

// ── FILTER ──
function applyFilters() {
  const q = searchEl.value.toLowerCase().trim();
  const catFn = CATS[activeCat].fn;
  filtered = CHANNELS.filter(ch => {
    const name = ch.name.trim();
    return catFn(name) && (!q || name.toLowerCase().includes(q));
  });
  render();
}

// ── RENDER ──
function render() {
  const count = filtered.length;
  chCount.textContent = count + ' 채널';

  if (count === 0) {
    channelGrid.innerHTML = '<div class="empty-state">일치하는 채널이 없습니다</div>';
    channelTableBody.innerHTML = '<tr><td colspan="4" class="empty-state">일치하는 채널이 없습니다</td></tr>';
    return;
  }

  // 박스형
  channelGrid.innerHTML = '';
  filtered.forEach((ch) => {
    const globalIdx = CHANNELS.indexOf(ch);
    const isActive = globalIdx === activeIdx;
    const card = document.createElement('div');
    card.className = 'channel-card' + (isActive ? ' active' : '');
    card.innerHTML = `
      ${isActive ? '<div class="card-live"><div class="card-live-dot"></div>LIVE</div>' : ''}
      <div class="card-avatar">${abbrev(ch.name)}</div>
      <div class="card-name">${ch.name}</div>
      <div class="card-tag">${getTag(ch.name)}</div>
    `;
    card.onclick = () => play(globalIdx);
    channelGrid.appendChild(card);
  });

  // 표형
  channelTableBody.innerHTML = '';
  filtered.forEach((ch, i) => {
    const globalIdx = CHANNELS.indexOf(ch);
    const isActive = globalIdx === activeIdx;
    const row = document.createElement('tr');
    row.className = isActive ? 'active' : '';
    row.innerHTML = `
      <td class="td-idx">${i + 1}</td>
      <td>${ch.name}</td>
      <td class="td-tag">${getTag(ch.name)}</td>
      <td class="td-live">${isActive ? '<span class="table-live"><span class="table-live-dot"></span>LIVE</span>' : ''}</td>
    `;
    row.onclick = () => play(globalIdx);
    channelTableBody.appendChild(row);
  });
}

// ── 상태 ──
let reconnectTimer = null;
let detourTimer = null;
let bgHls = null;          // 백그라운드 우회용 HLS (숨겨진 video)
let reconnectCount = 0;
let isReconnecting = false;
const MAX_RECONNECT = 5;
const BUFFER_SEC = 25;     // 메인 버퍼: 25초

// ── 백그라운드 video 엘리먼트 (우회 세션 리셋용, 화면 안 보임) ──
const bgVideo = document.createElement('video');
bgVideo.muted = true;
bgVideo.style.display = 'none';
document.body.appendChild(bgVideo);

// ── access denied 감지 커스텀 로더 ──
function makeCustomLoader(baseLoader) {
  return class CustomLoader extends baseLoader {
    load(context, config, callbacks) {
      const originalSuccess = callbacks.onSuccess;
      callbacks.onSuccess = (response, stats, ctx, networkDetails) => {
        if (response && response.data) {
          let text = '';
          if (typeof response.data === 'string') text = response.data;
          else if (response.data instanceof ArrayBuffer) {
            try { text = new TextDecoder().decode(new Uint8Array(response.data.slice(0, 300))); } catch(e) {}
          }
          if (text.includes('"success":0') && text.includes('access denied')) {
            callbacks.onError({ code: 403, text: 'access denied' }, ctx, networkDetails);
            return;
          }
        }
        originalSuccess(response, stats, ctx, networkDetails);
      };
      super.load(context, config, callbacks);
    }
  };
}

// ── HLS 설정 팩토리 ──
function hlsConfig(bufferSec) {
  return {
    enableWorker: true,
    lowLatencyMode: false,
    liveSyncDuration: bufferSec,          // 라이브 엣지에서 N초 뒤처지게
    liveMaxLatencyDuration: bufferSec + 5,
    maxBufferLength: bufferSec + 20,
    maxMaxBufferLength: bufferSec + 60,
    loader: makeCustomLoader(Hls.DefaultConfig.loader),
  };
}

// ── 백그라운드 우회 재연결 ──
// 메인 비디오는 버퍼에서 계속 재생 중인 동안 조용히 처리
function startBgReconnect(targetIdx) {
  if (isReconnecting) return;
  isReconnecting = true;
  reconnectCount = 0;

  function attempt() {
    if (activeIdx !== targetIdx) { isReconnecting = false; return; }
    if (reconnectCount >= MAX_RECONNECT) {
      isReconnecting = false;
      // 버퍼도 다 떨어졌을 때만 에러 표시
      if (video.paused || video.ended) {
        errMsg.classList.add('show');
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
          <div class="overlay-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c9006b" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <span class="overlay-text" style="color:#c9006b">스트림을 불러올 수 없습니다</span>`;
      }
      return;
    }
    reconnectCount++;

    // 1단계: 우회 채널을 bgVideo에 잠깐 로드 → 서버 세션 리셋
    if (bgHls) { bgHls.destroy(); bgHls = null; }
    const detourIdx = (targetIdx + 1) % CHANNELS.length;
    bgHls = new Hls(hlsConfig(3));
    bgHls.loadSource(CHANNELS[detourIdx].url);
    bgHls.attachMedia(bgVideo);
    bgVideo.play().catch(() => {});

    // 2단계: 2초 후 목표 채널을 bgVideo로 미리 로드 → 성공하면 메인으로 교체
    clearTimeout(detourTimer);
    detourTimer = setTimeout(() => {
      if (activeIdx !== targetIdx) { isReconnecting = false; return; }
      if (bgHls) { bgHls.destroy(); bgHls = null; }

      bgHls = new Hls(hlsConfig(3));
      bgHls.loadSource(CHANNELS[targetIdx].url);
      bgHls.attachMedia(bgVideo);

      bgHls.on(Hls.Events.MANIFEST_PARSED, () => {
        // 백그라운드에서 스트림 확보 성공 → 메인 HLS 교체
        if (activeIdx !== targetIdx) { isReconnecting = false; return; }
        bgVideo.pause();
        if (bgHls) { bgHls.destroy(); bgHls = null; }

        // 메인 HLS 새로 붙이기 (버퍼가 아직 남아 있으면 재생이 이어짐)
        if (currentHls) { currentHls.destroy(); currentHls = null; }
        const newHls = new Hls(hlsConfig(BUFFER_SEC));
        currentHls = newHls;
        newHls.loadSource(CHANNELS[targetIdx].url);
        newHls.attachMedia(video);
        newHls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          isReconnecting = false;
          reconnectCount = 0;
          errMsg.classList.remove('show');
          // 에러 중에 오버레이가 떴다면 숨김
          overlay.classList.add('hidden');
        });
        newHls.on(Hls.Events.ERROR, (_, d) => {
          if (d.fatal) {
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(attempt, 2000);
          }
        });
      });

      bgHls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          // 백그라운드도 실패 → 다시 시도
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(attempt, 2000);
        }
      });
    }, 2000);
  }

  attempt();
}

// ── PLAY ──
function play(idx) {
  if (idx === activeIdx) return;
  activeIdx = idx;
  const ch = CHANNELS[idx];

  // 이전 상태 전부 정리
  reconnectCount = 0;
  isReconnecting = false;
  clearTimeout(reconnectTimer);
  clearTimeout(detourTimer);
  if (bgHls) { bgHls.destroy(); bgHls = null; }
  bgVideo.pause();

  errMsg.classList.remove('show');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<div class="loading-ring"></div><span class="overlay-text">${ch.name} 불러오는 중…</span>`;
  viName.textContent = ch.name;
  viTag.textContent = getTag(ch.name);
  liveBadge.style.display = 'inline-flex';

  if (currentHls) { currentHls.destroy(); currentHls = null; }

  if (!Hls.isSupported()) {
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = ch.url;
      video.play().catch(() => {});
      overlay.classList.add('hidden');
    }
    render();
    return;
  }

  const hls = new Hls(hlsConfig(BUFFER_SEC));
  currentHls = hls;
  hls.loadSource(ch.url);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    video.play().catch(() => {});
    overlay.classList.add('hidden');
  });

  hls.on(Hls.Events.ERROR, (_, data) => {
    const isAccessDenied =
      (data.response && data.response.code === 403) ||
      (data.reason && typeof data.reason === 'string' && data.reason.includes('access denied'));

    if (isAccessDenied || data.fatal) {
      // 에러 감지 즉시 → 백그라운드에서 조용히 우회 재연결 시작
      // 메인 video는 버퍼에 쌓인 10초치를 계속 재생
      startBgReconnect(idx);
    }
  });

  render();
}

// ── SEARCH ──
searchEl.addEventListener('input', applyFilters);

// ── PLAYER CONTROLS ──
const videoWrap   = document.getElementById('video-wrap');
const btnPlay     = document.getElementById('btn-play');
const btnMute     = document.getElementById('btn-mute');
const btnFs       = document.getElementById('btn-fs');
const btnMore     = document.getElementById('btn-more');
const pcMenu      = document.getElementById('pc-menu');
const menuPip     = document.getElementById('menu-pip');
const iconPlay    = document.getElementById('icon-play');
const iconPause   = document.getElementById('icon-pause');
const iconVolOn   = document.getElementById('icon-vol-on');
const iconVolOff  = document.getElementById('icon-vol-off');

function syncPlayIcon() {
  const paused = video.paused;
  iconPlay.style.display  = paused  ? '' : 'none';
  iconPause.style.display = paused  ? 'none' : '';
}

// 재생/정지
btnPlay.addEventListener('click', () => {
  if (video.paused) video.play().catch(()=>{});
  else video.pause();
});
video.addEventListener('play',  syncPlayIcon);
video.addEventListener('pause', syncPlayIcon);

// 음소거 토글
function syncMuteIcon() {
  const muted = video.muted || video.volume === 0;
  iconVolOn.style.display  = muted ? 'none' : '';
  iconVolOff.style.display = muted ? '' : 'none';
}
btnMute.addEventListener('click', () => {
  video.muted = !video.muted;
  if (!video.muted && video.volume === 0) video.volume = 1;
  syncMuteIcon();
});
syncMuteIcon();

// 더보기 메뉴 (PIP)
btnMore.addEventListener('click', (e) => {
  e.stopPropagation();
  pcMenu.classList.toggle('open');
});
document.addEventListener('click', () => pcMenu.classList.remove('open'));
menuPip.addEventListener('click', (e) => {
  e.stopPropagation();
  pcMenu.classList.remove('open');
  if (!document.pictureInPictureElement) {
    video.requestPictureInPicture().catch(()=>{});
  } else {
    document.exitPictureInPicture().catch(()=>{});
  }
});

// 전체화면
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    videoWrap.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// 전체화면 시 아이콘 교체
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('icon-fs').innerHTML = isFs
    ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
    : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
});

// 볼륨 (키보드 단축키용, UI에는 표시하지 않음)
function updateVol(v) {
  v = Math.max(0, Math.min(1, v));
  video.volume = v;
  video.muted = (v === 0);
  syncMuteIcon();
}

// ── 단축키 ──
document.addEventListener('keydown', e => {
  // 검색창 포커스 중엔 무시
  if (e.target === searchEl) return;
  switch(e.key) {
    case ' ':
    case 'Spacebar':
      e.preventDefault();
      if (video.paused) video.play().catch(()=>{});
      else video.pause();
      break;
    case 'p': case 'P':
      if (!document.pictureInPictureElement) video.requestPictureInPicture().catch(()=>{});
      else document.exitPictureInPicture().catch(()=>{});
      break;
    case 'f': case 'F':
      if (!document.fullscreenElement) videoWrap.requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
      break;
    case ',': case '<':
      e.preventDefault();
      updateVol(video.volume - 0.1);
      break;
    case '.': case '>':
      e.preventDefault();
      updateVol(video.volume + 0.1);
      break;
  }
});

// ── INIT (channels.json 로드) ──
channelGrid.innerHTML = '<div class="empty-state">채널 목록 불러오는 중…</div>';
fetch('channels.json')
  .then(res => res.json())
  .then(data => {
    CHANNELS = data;
    filtered = [...CHANNELS];
    render();
  })
  .catch(err => {
    console.error('channels.json 로드 실패:', err);
    channelGrid.innerHTML = '<div class="empty-state">channels.json을 불러오지 못했습니다</div>';
  });
</script>
