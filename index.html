<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오징어티비</title>
<link rel="icon" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d0d;
    --surface: #12151a;
    --surface2: #1b1f23;
    --border: #272b2f;
    --accent: #ff2e63;
    --squid-teal: #0a3d34;
    --squid-pink: #ff2e63;
    --squid-pink2: #d6006d;
    --text: #eeeef2;
    --text2: #80809a;
    --text3: #3a3a50;
    --live: #22c55e;
    --sidebar: 320px;
    --radius: 10px;
  }

  /* ── THEMES ── */
  [data-theme="light"] {
    --bg: #f4f4f6;
    --surface: #ffffff;
    --surface2: #ebebf0;
    --border: #dddde5;
    --text: #111118;
    --text2: #666680;
    --text3: #aaaabc;
  }
  [data-theme="warm"] {
    --bg: #12100e;
    --surface: #1a1714;
    --surface2: #231f1b;
    --border: #2e2a25;
    --text: #f0ebe4;
    --text2: #8c8070;
    --text3: #4a4238;
  }
  [data-theme="midnight"] {
    --bg: #080c14;
    --surface: #0f1520;
    --surface2: #162030;
    --border: #1e2e40;
    --text: #dde8f5;
    --text2: #6080a0;
    --text3: #2a4060;
  }
  [data-theme="slate"] {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaee;
    --border: #d0d4dc;
    --text: #1a1d24;
    --text2: #5a6070;
    --text3: #a0a8b8;
    --accent: #3b5bdb;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: var(--sidebar) 1fr;
    height: 100vh;
    grid-template-areas:
      "header header"
      "sidebar main";
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: linear-gradient(120deg, var(--squid-teal) 0%, #0d0f10 55%, #0d0f10 100%);
    border-bottom: 2px solid var(--squid-pink);
    box-shadow: 0 1px 14px rgba(255,46,99,0.18);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--text);
    white-space: nowrap;
  }
  .logo img {
    width: 26px;
    height: 26px;
    object-fit: contain;
    border-radius: 6px;
    background: #000;
    padding: 2px;
    box-shadow: 0 0 0 1.5px var(--squid-pink);
  }
  .logo-brand {
    background: linear-gradient(90deg, #ffffff, var(--squid-pink) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .logo-shapes {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-left: 2px;
    color: var(--squid-pink);
    opacity: 0.85;
  }
  .logo-shapes svg { display: block; }
  .logo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--squid-pink);
    box-shadow: 0 0 8px var(--squid-pink);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }
  .header-sep { flex: 1; }
  .channel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
  }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    padding: 6px 14px 6px 32px;
    width: 180px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }
  #search:focus { border-color: var(--accent); width: 220px; }
  #search::placeholder { color: var(--text3); }

  /* 테마 버튼 */
  .theme-picker {
    display: flex; gap: 5px; align-items: center;
  }
  .theme-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .theme-dot:hover, .theme-dot.active { border-color: var(--text); transform: scale(1.15); }
  .theme-dot[data-t="dark"]     { background: #0c0c0e; box-shadow: inset 0 0 0 1px #444; }
  .theme-dot[data-t="light"]    { background: #f4f4f6; box-shadow: inset 0 0 0 1px #ccc; }
  .theme-dot[data-t="warm"]     { background: #2a1f14; }
  .theme-dot[data-t="midnight"] { background: #0a1428; }
  .theme-dot[data-t="slate"]    { background: linear-gradient(135deg,#3b5bdb,#f0f2f5); }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .categories {
    display: flex;
    gap: 4px;
    padding: 10px 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .cat-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .channel-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }
  .channel-list::-webkit-scrollbar { width: 3px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .channel-item:hover { background: var(--surface2); }
  .channel-item.active { background: var(--surface2); }
  .channel-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
  }
  .ch-avatar {
    width: 30px; height: 30px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 9px;
    color: var(--text2);
    flex-shrink: 0;
    letter-spacing: -0.5px;
    overflow: hidden;
  }
  .channel-item.active .ch-avatar { border-color: var(--accent); color: var(--accent); }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ch-tag { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .live-badge {
    display: flex; align-items: center; gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px; font-weight: 500;
    color: var(--live); letter-spacing: 1px; flex-shrink: 0;
  }
  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%; background: var(--live);
    animation: blink 1.5s infinite;
  }

  /* ── MAIN ── */
  .main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── VIDEO AREA ── */
  .video-wrap {
    position: relative;
    background: #000;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* 전체화면 */
  .video-wrap:fullscreen,
  .video-wrap:-webkit-full-screen {
    width: 100vw; height: 100vh;
    max-height: none; aspect-ratio: unset;
    background: #000;
  }
  .video-wrap:fullscreen video,
  .video-wrap:-webkit-full-screen video {
    object-fit: contain;
  }

  /* ── CUSTOM CONTROLS ── */
  .player-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 64px 24px 16px;
    background: linear-gradient(to top,
      rgba(0,0,0,0.78) 0%,
      rgba(0,0,0,0.18) 65%,
      transparent 100%);
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .video-wrap:hover .player-controls,
  .video-wrap.show-controls .player-controls {
    opacity: 1;
    pointer-events: all;
  }
  .ctrl-left, .ctrl-right {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .ctrl-right { justify-content: flex-end; }
  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.72);
    cursor: pointer; padding: 4px;
    display: flex; align-items: center;
    transition: color 0.15s, transform 0.12s;
    user-select: none;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
  }
  .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.92); }
  .ctrl-play {
    position: absolute; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7));
  }
  .ctrl-play:hover { transform: translateX(-50%) scale(1.12); color: #fff; }
  .ctrl-play:active { transform: translateX(-50%) scale(0.91); }
  .ctrl-vol { display: flex; align-items: center; gap: 7px; }
  .ctrl-vol svg { color: rgba(255,255,255,0.7); flex-shrink: 0; }
  .vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 72px; height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.22);
    outline: none; cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff; cursor: pointer;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    transition: transform 0.1s;
  }
  .vol-slider:hover::-webkit-slider-thumb { transform: scale(1.3); }
  .vol-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; color: rgba(255,255,255,0.4);
    min-width: 28px;
  }

  /* ── OVERLAY ── */
  .video-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    flex-direction: column; gap: 10px;
    transition: opacity 0.3s;
  }
  .video-overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .overlay-text { color: var(--text2); font-size: 13px; }
  .loading-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── INFO BAR ── */
  .video-info {
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
    height: 38px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .vi-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent);
    border-radius: 3px; padding: 2px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px; font-weight: 500;
    color: #fff; letter-spacing: 1.2px; flex-shrink: 0;
  }
  .vi-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .vi-sep { flex: 1; }
  .vi-tag {
    font-size: 10px; color: var(--text3);
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px;
  }
  .err-msg {
    display: none; align-items: center; gap: 5px;
    color: #ff6b6b; font-size: 11px;
    padding: 2px 8px;
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.25);
    border-radius: 4px;
  }
  .err-msg.show { display: flex; }

</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="logo.png" alt="오징어티비">
      <span class="logo-brand">오징어티비</span>
      <div class="logo-shapes">
        <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,8.5 1,8.5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1.3" y="1.3" width="7.4" height="7.4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
      </div>
      <div class="logo-dot"></div>
    </div>
    <div class="header-sep"></div>
    <span class="channel-count" id="ch-count">로딩중…</span>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="채널 검색…" autocomplete="off">
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="categories" id="categories"></div>
    <div class="channel-list" id="sidebar-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- VIDEO -->
    <div class="video-wrap" id="video-wrap">
      <video id="video" autoplay playsinline></video>
      <!-- 커스텀 컨트롤 -->
      <div class="player-controls" id="player-controls">
        <!-- 왼쪽: 볼륨 -->
        <div class="ctrl-left">
          <div class="ctrl-vol">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="100">
            <span class="vol-pct" id="vol-pct">100%</span>
          </div>
        </div>
        <!-- 가운데: 재생/정지 -->
        <button class="ctrl-btn ctrl-play" id="btn-play" title="재생/정지 (Space)">
          <svg id="icon-play" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="5 3 19 12 5 21"/>
          </svg>
          <svg id="icon-pause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
        <!-- 오른쪽: PIP + 전체화면 -->
        <div class="ctrl-right">
          <button class="ctrl-btn" id="btn-pip" title="PIP (P)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <rect x="12" y="11" width="8" height="5" rx="1" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-fs" title="전체화면 (F)">
            <svg id="icon-fs" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <polyline points="15 3 21 3 21 9"/>
              <polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="video-overlay" id="overlay">
        <div class="overlay-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#44445a" stroke-width="1.5">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <span class="overlay-text">채널을 선택하세요</span>
      </div>
    </div>

    <!-- INFO BAR -->
    <div class="video-info">
      <span class="vi-badge" id="live-badge" style="display:none">
        <span class="live-dot" style="width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite"></span>
        LIVE
      </span>
      <span class="vi-name" id="vi-name">채널을 선택해주세요</span>
      <span class="vi-sep"></span>
      <span class="vi-tag" id="vi-tag"></span>
      <div class="err-msg" id="err-msg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        스트림 연결 오류
      </div>
    </div>

  </main>
</div>

<script>
let CHANNELS = [];

// ── CATEGORY CONFIG ──
const CATS = [
  { label: '전체', fn: () => true },
  { label: '지상파', fn: n => /^(KBS1|KBS2|MBC|SBS|EBS)$/.test(n.trim()) },
  { label: '종편/케이블', fn: n => ['JTBC','TV 조선','채널A','MBN','TVN','tvN Show','OCN','M-NET','iHQ','ENA','MBC ON'].includes(n.trim()) },
  { label: '뉴스', fn: n => /뉴스|YTN|경제|CBS|iNET/.test(n) },
  { label: '스포츠', fn: n => /스포츠|SPOTV|골프|빌리어즈|TVN Sports|Sky/.test(n) },
  { label: '키즈', fn: n => /육아|뽀요|어린이|에듀|투니|카툰|JEI/.test(n) },
  { label: '교양', fn: n => /디스커버리|Nat Geo|HISTORY|바둑|브레인|낚시|Discovery/.test(n) },
  { label: '종교', fn: n => /가톨릭|CTS|불교/.test(n) },
  { label: '해외', fn: n => /NHK|日テレ|フジ|朝日|WOWOW|CNN|BBC|中|중화/.test(n) },
  { label: 'HD', fn: n => / HD$/.test(n.trim()) },
];

// ── ABBREV ──
function abbrev(name) {
  name = name.replace(/ HD$/, '').trim();
  const words = name.split(/[\s\-_]+/);
  if (name.length <= 4) return name.toUpperCase();
  if (words.length >= 2) return words.slice(0, 2).map(w => w[0]).join('').toUpperCase();
  return name.slice(0, 3).toUpperCase();
}

// ── CATEGORY TAG ──
function getTag(name) {
  if (/^(KBS1|KBS2|MBC|SBS|EBS)$/.test(name.trim())) return '지상파';
  if (/스포츠|SPOTV|골프|빌리어즈|TVN Sports/.test(name)) return '스포츠';
  if (/뉴스|YTN|경제|CBS|iNET/.test(name)) return '뉴스';
  if (/육아|뽀요|어린이|에듀|투니|카툰|JEI/.test(name)) return '키즈';
  if (/NHK|日テレ|フジ|朝日|WOWOW|CNN|BBC/.test(name)) return '해외';
  if (/가톨릭|CTS|불교/.test(name)) return '종교';
  if (/디스커버리|Nat Geo|HISTORY|바둑|낚시/.test(name)) return '교양';
  return '케이블';
}

// ── STATE ──
let activeCat = 0;
let activeIdx = null;
let currentHls = null;
let filtered = [];

// ── DOM ──
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const viName = document.getElementById('vi-name');
const viTag = document.getElementById('vi-tag');
const liveBadge = document.getElementById('live-badge');
const errMsg = document.getElementById('err-msg');
const sidebarList = document.getElementById('sidebar-list');
const searchEl = document.getElementById('search');
const chCount = document.getElementById('ch-count');

// ── BUILD CATEGORIES ──
const catWrap = document.getElementById('categories');
CATS.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cat.label;
  btn.onclick = () => {
    activeCat = i;
    document.querySelectorAll('.cat-btn').forEach((b,j) => b.classList.toggle('active', j === i));
    applyFilters();
  };
  catWrap.appendChild(btn);
});

// ── FILTER ──
function applyFilters() {
  const q = searchEl.value.toLowerCase().trim();
  const catFn = CATS[activeCat].fn;
  filtered = CHANNELS.filter(ch => {
    const name = ch.name.trim();
    return catFn(name) && (!q || name.toLowerCase().includes(q));
  });
  render();
}

// ── RENDER ──
function render() {
  const count = filtered.length;
  chCount.textContent = count + ' 채널';

  // Sidebar
  sidebarList.innerHTML = '';
  filtered.forEach((ch) => {
    const globalIdx = CHANNELS.indexOf(ch);
    const item = document.createElement('div');
    item.className = 'channel-item' + (globalIdx === activeIdx ? ' active' : '');
    item.innerHTML = `
      <div class="ch-avatar">${abbrev(ch.name)}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-tag">${getTag(ch.name)}</div>
      </div>
      ${globalIdx === activeIdx ? '<div class="live-badge"><div class="live-dot"></div>LIVE</div>' : ''}
    `;
    item.onclick = () => play(globalIdx);
    sidebarList.appendChild(item);
  });
}

// ── 상태 ──
let reconnectTimer = null;
let detourTimer = null;
let bgHls = null;          // 백그라운드 우회용 HLS (숨겨진 video)
let reconnectCount = 0;
let isReconnecting = false;
const MAX_RECONNECT = 5;
const BUFFER_SEC = 25;     // 메인 버퍼: 25초

// ── 백그라운드 video 엘리먼트 (우회 세션 리셋용, 화면 안 보임) ──
const bgVideo = document.createElement('video');
bgVideo.muted = true;
bgVideo.style.display = 'none';
document.body.appendChild(bgVideo);

// ── access denied 감지 커스텀 로더 ──
function makeCustomLoader(baseLoader) {
  return class CustomLoader extends baseLoader {
    load(context, config, callbacks) {
      const originalSuccess = callbacks.onSuccess;
      callbacks.onSuccess = (response, stats, ctx, networkDetails) => {
        if (response && response.data) {
          let text = '';
          if (typeof response.data === 'string') text = response.data;
          else if (response.data instanceof ArrayBuffer) {
            try { text = new TextDecoder().decode(new Uint8Array(response.data.slice(0, 300))); } catch(e) {}
          }
          if (text.includes('"success":0') && text.includes('access denied')) {
            callbacks.onError({ code: 403, text: 'access denied' }, ctx, networkDetails);
            return;
          }
        }
        originalSuccess(response, stats, ctx, networkDetails);
      };
      super.load(context, config, callbacks);
    }
  };
}

// ── HLS 설정 팩토리 ──
function hlsConfig(bufferSec) {
  return {
    enableWorker: true,
    lowLatencyMode: false,
    liveSyncDuration: bufferSec,          // 라이브 엣지에서 N초 뒤처지게
    liveMaxLatencyDuration: bufferSec + 5,
    maxBufferLength: bufferSec + 20,
    maxMaxBufferLength: bufferSec + 60,
    loader: makeCustomLoader(Hls.DefaultConfig.loader),
  };
}

// ── 백그라운드 우회 재연결 ──
// 메인 비디오는 버퍼에서 계속 재생 중인 동안 조용히 처리
function startBgReconnect(targetIdx) {
  if (isReconnecting) return;
  isReconnecting = true;
  reconnectCount = 0;

  function attempt() {
    if (activeIdx !== targetIdx) { isReconnecting = false; return; }
    if (reconnectCount >= MAX_RECONNECT) {
      isReconnecting = false;
      // 버퍼도 다 떨어졌을 때만 에러 표시
      if (video.paused || video.ended) {
        errMsg.classList.add('show');
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
          <div class="overlay-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <span class="overlay-text" style="color:#e63946">스트림을 불러올 수 없습니다</span>`;
      }
      return;
    }
    reconnectCount++;

    // 1단계: 우회 채널을 bgVideo에 잠깐 로드 → 서버 세션 리셋
    if (bgHls) { bgHls.destroy(); bgHls = null; }
    const detourIdx = (targetIdx + 1) % CHANNELS.length;
    bgHls = new Hls(hlsConfig(3));
    bgHls.loadSource(CHANNELS[detourIdx].url);
    bgHls.attachMedia(bgVideo);
    bgVideo.play().catch(() => {});

    // 2단계: 2초 후 목표 채널을 bgVideo로 미리 로드 → 성공하면 메인으로 교체
    clearTimeout(detourTimer);
    detourTimer = setTimeout(() => {
      if (activeIdx !== targetIdx) { isReconnecting = false; return; }
      if (bgHls) { bgHls.destroy(); bgHls = null; }

      bgHls = new Hls(hlsConfig(3));
      bgHls.loadSource(CHANNELS[targetIdx].url);
      bgHls.attachMedia(bgVideo);

      bgHls.on(Hls.Events.MANIFEST_PARSED, () => {
        // 백그라운드에서 스트림 확보 성공 → 메인 HLS 교체
        if (activeIdx !== targetIdx) { isReconnecting = false; return; }
        bgVideo.pause();
        if (bgHls) { bgHls.destroy(); bgHls = null; }

        // 메인 HLS 새로 붙이기 (버퍼가 아직 남아 있으면 재생이 이어짐)
        if (currentHls) { currentHls.destroy(); currentHls = null; }
        const newHls = new Hls(hlsConfig(BUFFER_SEC));
        currentHls = newHls;
        newHls.loadSource(CHANNELS[targetIdx].url);
        newHls.attachMedia(video);
        newHls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          isReconnecting = false;
          reconnectCount = 0;
          errMsg.classList.remove('show');
          // 에러 중에 오버레이가 떴다면 숨김
          overlay.classList.add('hidden');
        });
        newHls.on(Hls.Events.ERROR, (_, d) => {
          if (d.fatal) {
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(attempt, 2000);
          }
        });
      });

      bgHls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          // 백그라운드도 실패 → 다시 시도
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(attempt, 2000);
        }
      });
    }, 2000);
  }

  attempt();
}

// ── PLAY ──
function play(idx) {
  if (idx === activeIdx) return;
  activeIdx = idx;
  const ch = CHANNELS[idx];

  // 이전 상태 전부 정리
  reconnectCount = 0;
  isReconnecting = false;
  clearTimeout(reconnectTimer);
  clearTimeout(detourTimer);
  if (bgHls) { bgHls.destroy(); bgHls = null; }
  bgVideo.pause();

  errMsg.classList.remove('show');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<div class="loading-ring"></div><span class="overlay-text">${ch.name} 불러오는 중…</span>`;
  viName.textContent = ch.name;
  viTag.textContent = getTag(ch.name);
  liveBadge.style.display = 'inline-flex';

  if (currentHls) { currentHls.destroy(); currentHls = null; }

  if (!Hls.isSupported()) {
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = ch.url;
      video.play().catch(() => {});
      overlay.classList.add('hidden');
    }
    render();
    return;
  }

  const hls = new Hls(hlsConfig(BUFFER_SEC));
  currentHls = hls;
  hls.loadSource(ch.url);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    video.play().catch(() => {});
    overlay.classList.add('hidden');
  });

  hls.on(Hls.Events.ERROR, (_, data) => {
    const isAccessDenied =
      (data.response && data.response.code === 403) ||
      (data.reason && typeof data.reason === 'string' && data.reason.includes('access denied'));

    if (isAccessDenied || data.fatal) {
      // 에러 감지 즉시 → 백그라운드에서 조용히 우회 재연결 시작
      // 메인 video는 버퍼에 쌓인 10초치를 계속 재생
      startBgReconnect(idx);
    }
  });

  render();
}

// ── SEARCH ──
searchEl.addEventListener('input', applyFilters);

// ── PLAYER CONTROLS ──
const videoWrap   = document.getElementById('video-wrap');
const btnPlay     = document.getElementById('btn-play');
const btnPip      = document.getElementById('btn-pip');
const btnFs       = document.getElementById('btn-fs');
const volSlider   = document.getElementById('vol-slider');
const volPct      = document.getElementById('vol-pct');
const iconPlay    = document.getElementById('icon-play');
const iconPause   = document.getElementById('icon-pause');

function syncPlayIcon() {
  const paused = video.paused;
  iconPlay.style.display  = paused  ? '' : 'none';
  iconPause.style.display = paused  ? 'none' : '';
}

// 재생/정지
btnPlay.addEventListener('click', () => {
  if (video.paused) video.play().catch(()=>{});
  else video.pause();
});
video.addEventListener('play',  syncPlayIcon);
video.addEventListener('pause', syncPlayIcon);

// PIP
btnPip.addEventListener('click', () => {
  if (!document.pictureInPictureElement) {
    video.requestPictureInPicture().catch(()=>{});
  } else {
    document.exitPictureInPicture().catch(()=>{});
  }
});

// 전체화면
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    videoWrap.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
});

// 전체화면 시 아이콘 교체
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('icon-fs').innerHTML = isFs
    ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
    : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
});

// 볼륨 슬라이더
function updateVol(v) {
  v = Math.max(0, Math.min(1, v));
  video.volume = v;
  video.muted = (v === 0);
  volSlider.value = Math.round(v * 100);
  volPct.textContent = Math.round(v * 100) + '%';
  // 슬라이더 채움 색
  volSlider.style.background =
    `linear-gradient(to right, rgba(255,255,255,0.8) ${v*100}%, rgba(255,255,255,0.18) ${v*100}%)`;
}
volSlider.addEventListener('input', () => updateVol(volSlider.value / 100));
updateVol(1);

// ── 단축키 ──
document.addEventListener('keydown', e => {
  // 검색창 포커스 중엔 무시
  if (e.target === searchEl) return;
  switch(e.key) {
    case ' ':
    case 'Spacebar':
      e.preventDefault();
      if (video.paused) video.play().catch(()=>{});
      else video.pause();
      break;
    case 'p': case 'P':
      if (!document.pictureInPictureElement) video.requestPictureInPicture().catch(()=>{});
      else document.exitPictureInPicture().catch(()=>{});
      break;
    case 'f': case 'F':
      if (!document.fullscreenElement) videoWrap.requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
      break;
    case ',': case '<':
      e.preventDefault();
      updateVol(video.volume - 0.1);
      break;
    case '.': case '>':
      e.preventDefault();
      updateVol(video.volume + 0.1);
      break;
  }
});

// ── INIT (channels.json 로드) ──
sidebarList.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center;">채널 목록 불러오는 중…</div>';
fetch('channels.json')
  .then(res => res.json())
  .then(data => {
    CHANNELS = data;
    filtered = [...CHANNELS];
    render();
  })
  .catch(err => {
    console.error('channels.json 로드 실패:', err);
    sidebarList.innerHTML = '<div style="padding:16px;color:var(--squid-pink);font-size:12px;text-align:center;">channels.json을 불러오지 못했습니다</div>';
  });
</script>
</body>
</html>
